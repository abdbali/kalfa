name: Feature Request
description: Yeni bir özellik, agent, komut veya skill önerin
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Öneri göndermeden önce mevcut issue'ları ve `.claude/command-index.md` dosyasını kontrol edin.

  - type: dropdown
    id: type
    attributes:
      label: Öneri Türü
      options:
        - Yeni Agent
        - Yeni Komut
        - Yeni Skill
        - Hook İyileştirmesi
        - Mevcut Bileşen İyileştirmesi
        - Diğer
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Hangi Sorunu Çözüyor?
      description: Şu an hangi iş akışı zahmetli veya eksik?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Önerilen Çözüm
      description: Nasıl çalışmasını hayal ediyorsunuz?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Değerlendirilen Alternatifler
      description: Başka yaklaşımlar düşündünüz mü?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Ek Bağlam
      description: Örnek kullanım senaryosu, referans projeler vb.
    validations:
      required: false
